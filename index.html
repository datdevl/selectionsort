<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SELECTION SORT • GALAXY</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
    <style>
        :root {
            --primary: #00f5ff;
            --accent: #ff00ff;
            --gold: #ffd700;
            --nebula: #6e00ff;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: radial-gradient(circle at 50% 30%, #1a0033 0%, #0a001f 60%, #000011 100%);
            color: #e0f8ff;
            font-family: 'Inter', system-ui, "Segoe UI", sans-serif;
            min-height: 100vh;
            overflow-x: hidden;
            position: relative;
        }

        /* Animated Galaxy Background */
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background: 
                radial-gradient(circle at 20% 30%, rgba(110, 0, 255, 0.15) 0%, transparent 50%),
                radial-gradient(circle at 80% 70%, rgba(0, 245, 255, 0.12) 0%, transparent 50%),
                radial-gradient(circle at 50% 50%, rgba(255, 0, 255, 0.08) 0%, transparent 60%);
            background-size: 200% 200%;
            animation: nebulaDrift 45s linear infinite;
            z-index: -2;
            pointer-events: none;
        }

        body::after {
            content: '';
            position: fixed;
            inset: 0;
            background-image: 
                radial-gradient(white 0.8px, transparent 1px),
                radial-gradient(white 0.6px, transparent 1px);
            background-position: 0 0, 25px 25px;
            background-size: 50px 50px;
            opacity: 0.07;
            animation: starTwinkle 8s linear infinite;
            z-index: -1;
            pointer-events: none;
        }

        @keyframes nebulaDrift {
            0% { background-position: 0% 50%; }
            100% { background-position: 200% 150%; }
        }

        @keyframes starTwinkle {
            0%, 100% { opacity: 0.07; }
            50% { opacity: 0.12; }
        }

        .header {
            text-align: center;
            padding: 40px 20px 20px;
            position: relative;
        }

        h1 {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 3.8rem;
            font-weight: 700;
            letter-spacing: -4px;
            background: linear-gradient(90deg, #00f5ff, #ff00ff, #ffd700, #00f5ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-size: 300% 300%;
            animation: cosmicTitle 10s ease infinite;
            text-shadow: 0 0 60px rgba(0, 245, 255, 0.6);
        }

        .subtitle {
            font-size: 1.15rem;
            color: #a0f0ff;
            margin-top: 8px;
            letter-spacing: 3px;
            opacity: 0.9;
        }

        .container {
            display: grid;
            grid-template-columns: 1fr 440px;
            gap: 28px;
            max-width: 1450px;
            margin: 0 auto;
            padding: 0 25px;
        }

        .glass-panel {
            background: rgba(15, 10, 45, 0.75);
            backdrop-filter: blur(24px);
            border: 1px solid rgba(150, 100, 255, 0.2);
            border-radius: 28px;
            box-shadow: 0 30px 70px rgba(0, 0, 0, 0.8),
                        inset 0 0 40px rgba(100, 200, 255, 0.08);
        }

        .controls {
            padding: 32px;
            display: flex;
            flex-wrap: wrap;
            gap: 18px;
            align-items: end;
        }

        label {
            font-size: 0.75rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: var(--primary);
        }

        input[type="text"] {
            width: 100%;
            background: rgba(0,0,0,0.5);
            border: 1px solid rgba(0, 245, 255, 0.4);
            color: white;
            padding: 16px 18px;
            border-radius: 16px;
            font-size: 1.05rem;
        }

        button {
            padding: 15px 28px;
            border-radius: 16px;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 10px;
            transition: all 0.4s cubic-bezier(0.23, 1, 0.32, 1);
        }

        .btn-primary { 
            background: linear-gradient(90deg, #00f5ff, #00b8ff); 
            color: #000; 
            box-shadow: 0 0 25px rgba(0, 245, 255, 0.5);
        }
        .btn-secondary { background: transparent; border: 2px solid var(--primary); color: var(--primary); }
        .btn-pause { background: linear-gradient(90deg, #ff00aa, #ff5500); color: white; min-width: 155px; }

        button:hover:not(:disabled) {
            transform: translateY(-5px) scale(1.05);
            box-shadow: 0 20px 40px rgba(0, 245, 255, 0.4);
        }

        /* Super Premium Circular Progress */
        .progress-circle {
            width: 200px;
            height: 200px;
            margin: 20px auto;
            position: relative;
        }

        .progress-circle svg {
            filter: drop-shadow(0 0 25px #00f5ff);
        }

        .progress-circle .bg-circle {
            fill: none;
            stroke: rgba(255,255,255,0.06);
            stroke-width: 16;
        }

        .progress-circle .progress {
            fill: none;
            stroke: url(#galaxyGrad);
            stroke-width: 16;
            stroke-linecap: round;
            transition: stroke-dashoffset 0.8s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .circle-text {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 2.4rem;
            font-weight: 700;
            background: linear-gradient(#fff, #a0f0ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        /* Holographic Bars */
        .stage {
            height: 440px;
            display: flex;
            align-items: flex-end;
            justify-content: center;
            gap: 12px;
            padding: 50px 40px 40px;
            background: linear-gradient(to bottom, rgba(20,10,60,0.6), rgba(5,2,25,0.95));
            border-radius: 0 0 28px 28px;
            position: relative;
            overflow: hidden;
        }

        .stage::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; height: 2px;
            background: linear-gradient(90deg, transparent, #00f5ff, transparent);
            box-shadow: 0 0 30px #00f5ff;
        }

        .bar {
            flex: 1;
            min-width: 28px;
            background: linear-gradient(180deg, #00f5ff, #0088cc);
            border-radius: 12px 12px 4px 4px;
            position: relative;
            transition: all 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
            box-shadow: 0 15px 30px rgba(0, 245, 255, 0.3);
            border-top: 2px solid rgba(255,255,255,0.3);
        }

        .bar::after {
            content: attr(data-value);
            position: absolute;
            top: -34px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 0.9rem;
            font-weight: 800;
            color: #fff;
            text-shadow: 0 0 12px #00f5ff;
        }

        .is-min { 
            background: linear-gradient(180deg, #ffd700, #ffaa00) !important;
            transform: scale(1.22) translateY(-28px) !important;
            box-shadow: 0 0 50px #ffd700;
            z-index: 30;
        }
        .is-comparing { background: linear-gradient(180deg, #ff3399, #cc0066) !important; }
        .is-sorted { 
            background: linear-gradient(180deg, #00ffaa, #00cc77) !important;
            box-shadow: 0 0 35px #00ffaa;
        }

        .log-container {
            height: 520px;
            overflow-y: auto;
            padding: 25px;
            font-size: 0.96rem;
        }

        .log-item {
            padding: 13px 16px;
            margin-bottom: 12px;
            background: rgba(20, 10, 60, 0.6);
            border-radius: 14px;
            border-left: 5px solid var(--primary);
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }
    </style>
</head>
<body>

    <div class="header">
        <h1>SELECTION SORT</h1>
        <p class="subtitle">PRO MAX</p>
    </div>

    <div class="container">
        <div>
            <div class="glass-panel controls">
                <div class="input-group" style="flex:1.5">
                    <label>MẢNG SỐ • COSMIC</label>
                    <input type="text" id="input-data" value="64, 34, 25, 12, 22, 11, 90, 88, 45, 67">
                </div>

                <div class="input-group">
                    <label>TỐC ĐỘ</label>
                    <input type="range" id="speed" min="40" max="1100" value="520" style="width:100%;">
                    <div style="text-align:center; margin-top:8px; font-weight:700; color:var(--primary);" id="speed-val">520ms</div>
                </div>

                <button class="btn-secondary" id="btn-rand"><i class="fas fa-dice"></i> NGẪU NHIÊN</button>
                <button class="btn-primary" id="btn-start"><i class="fas fa-play"></i> KHỞI ĐỘNG</button>
                <button class="btn-pause" id="btn-pause" disabled><i class="fas fa-pause"></i> TẠM DỪNG</button>
            </div>

            <div class="glass-panel stage" id="stage"></div>
        </div>

        <div>
            <div class="glass-panel" style="padding:35px 25px; text-align:center;">
                <div class="progress-circle">
                    <svg width="200" height="200" viewBox="0 0 200 200">
                        <defs>
                            <linearGradient id="galaxyGrad" x1="0%" y1="0%" x2="100%" y2="100%">
                                <stop offset="0%" stop-color="#00f5ff"/>
                                <stop offset="50%" stop-color="#ff00ff"/>
                                <stop offset="100%" stop-color="#ffd700"/>
                            </linearGradient>
                        </defs>
                        <circle class="bg-circle" cx="100" cy="100" r="86"/>
                        <circle class="progress" id="progress-circle" cx="100" cy="100" r="86" 
                                stroke-dasharray="540" stroke-dashoffset="540"/>
                    </svg>
                    <div class="circle-text" id="progress-text">0%</div>
                </div>
                <p style="margin-top:20px; color:#b0d0ff; font-size:1.1rem;" id="step-info">
                    Bước <span id="current-step">0</span> / <span id="total-step">0</span>
                </p>
            </div>

            <div class="glass-panel log-container" id="log-display" style="margin-top:22px;"></div>
        </div>
    </div>

    <script>
        // Script giữ nguyên logic Selection Sort nhưng tối ưu hiệu ứng
        const stage = document.getElementById('stage');
        const logDisplay = document.getElementById('log-display');
        const inputData = document.getElementById('input-data');
        const speedInput = document.getElementById('speed');
        const speedVal = document.getElementById('speed-val');
        const btnStart = document.getElementById('btn-start');
        const btnRand = document.getElementById('btn-rand');
        const btnPause = document.getElementById('btn-pause');

        const progressCircle = document.getElementById('progress-circle');
        const progressText = document.getElementById('progress-text');
        const currentStepEl = document.getElementById('current-step');
        const totalStepEl = document.getElementById('total-step');

        let array = [];
        let isRunning = false;
        let isPaused = false;
        let pauseResolve = null;

        function addLog(msg, color = '#88ffff') {
            const item = document.createElement('div');
            item.className = 'log-item';
            item.style.borderLeftColor = color;
            item.innerHTML = msg;
            logDisplay.prepend(item);
            if (logDisplay.children.length > 20) logDisplay.removeChild(logDisplay.lastChild);
        }

        function renderBars() {
            stage.innerHTML = '';
            const maxVal = Math.max(...array, 1);
            array.forEach((val, i) => {
                const bar = document.createElement('div');
                bar.className = 'bar';
                bar.id = `bar-${i}`;
                bar.style.height = `${(val / maxVal) * 88}%`;
                bar.setAttribute('data-value', val);
                stage.appendChild(bar);
            });
        }

        function updateProgress(current, total) {
            const percent = Math.round((current / total) * 100);
            const offset = 540 - (540 * percent / 100);
            progressCircle.style.strokeDashoffset = offset;
            progressText.textContent = percent + '%';
            currentStepEl.textContent = current;
            totalStepEl.textContent = total;
        }

        function generateRandom() {
            if (isRunning) return;
            const size = 9;
            array = Array.from({ length: size }, () => Math.floor(Math.random() * 95) + 10);
            inputData.value = array.join(', ');
            addLog('<strong>🌌 Mảng vũ trụ mới đã được tạo</strong>', '#ffd700');
            renderBars();
            resetProgress();
        }

        function resetProgress() {
            progressCircle.style.strokeDashoffset = 540;
            progressText.textContent = '0%';
            currentStepEl.textContent = '0';
        }

        const wait = (ms) => new Promise(resolve => {
            if (isPaused) { pauseResolve = resolve; return; }
            setTimeout(resolve, ms);
        });

        async function selectionSort() {
            isRunning = true;
            isPaused = false;
            btnStart.disabled = true;
            btnRand.disabled = true;
            btnPause.disabled = false;
            btnPause.innerHTML = `<i class="fas fa-pause"></i> TẠM DỪNG`;

            const n = array.length;
            const bars = document.querySelectorAll('.bar');

            addLog('<strong>🌠 BẮT ĐẦU HÀNH TRÌNH SELECTION SORT</strong>', '#00f5ff');

            for (let i = 0; i < n - 1; i++) {
                let minIdx = i;
                bars[minIdx].classList.add('is-min');
                addLog(`<strong>Tìm giá trị nhỏ nhất từ vị trí ${i}</strong>`, '#ffd700');
                await wait(650 - speedInput.value * 0.3);

                for (let j = i + 1; j < n; j++) {
                    bars[j].classList.add('is-comparing');
                    await wait(380 - speedInput.value * 0.25);

                    if (array[j] < array[minIdx]) {
                        bars[minIdx].classList.remove('is-min');
                        minIdx = j;
                        bars[minIdx].classList.add('is-min');
                    }
                    bars[j].classList.remove('is-comparing');
                }

                if (minIdx !== i) {
                    addLog(`🔄 Hoán đổi ${array[i]} ↔ ${array[minIdx]}`, '#ff00ff');
                    [array[i], array[minIdx]] = [array[minIdx], array[i]];

                    const maxVal = Math.max(...array, 1);
                    bars[i].style.height = `${(array[i] / maxVal) * 88}%`;
                    bars[i].setAttribute('data-value', array[i]);
                    bars[minIdx].style.height = `${(array[minIdx] / maxVal) * 88}%`;
                    bars[minIdx].setAttribute('data-value', array[minIdx]);
                }

                bars[minIdx].classList.remove('is-min');
                bars[i].classList.add('is-sorted');
                updateProgress(i + 1, n - 1);
                await wait(550 - speedInput.value * 0.35);
            }

            bars[n-1].classList.add('is-sorted');
            updateProgress(n-1, n-1);

            addLog('<strong>✨ HÀNH TRÌNH HOÀN THÀNH — VŨ TRỤ ĐÃ SẮP XẾP!</strong>', '#00ffcc');
            stage.style.boxShadow = '0 0 80px rgba(0, 245, 255, 0.7)';
            setTimeout(() => stage.style.boxShadow = '', 3000);

            resetButtons();
        }

        function resetButtons() {
            isRunning = false;
            isPaused = false;
            btnStart.disabled = false;
            btnRand.disabled = false;
            btnPause.disabled = true;
        }

        speedInput.addEventListener('input', () => speedVal.textContent = speedInput.value + 'ms');

        btnRand.onclick = generateRandom;

        btnStart.onclick = () => {
            if (isRunning) return;
            const vals = inputData.value.split(',').map(x => parseInt(x.trim())).filter(x => !isNaN(x));
            if (vals.length < 2) return alert("Cần ít nhất 2 số!");
            array = vals;
            renderBars();
            resetProgress();
            selectionSort();
        };

        btnPause.onclick = () => {
            if (!isRunning) return;
            isPaused = !isPaused;
            if (!isPaused && pauseResolve) pauseResolve();

            if (isPaused) {
                btnPause.innerHTML = `<i class="fas fa-play"></i> TIẾP TỤC`;
                btnPause.style.background = 'linear-gradient(90deg, #00cc88, #00aa66)';
            } else {
                btnPause.innerHTML = `<i class="fas fa-pause"></i> TẠM DỪNG`;
                btnPause.style.background = 'linear-gradient(90deg, #ff00aa, #ff5500)';
            }
        };

        window.onload = () => {
            generateRandom();
            addLog('🌌 Chào mừng đến với <strong>SELECTION SORT GALAXY</strong>', '#00f5ff');
        };
    </script>
</body>
</html>
